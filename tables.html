<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .table-container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            text-transform: uppercase;
            font-size: 14px;
        }

        tbody tr {
            border-bottom: 1px solid #ddd;
        }

        tbody tr:hover {
            background-color: #f1f1f1;
        }

        tbody tr:nth-child(even) {
            background-color: #fafafa;
        }

        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 10px;
            }

            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 50%;
                text-align: left;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>

<div class="table-container">
    <h2>Student Information</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td data-label="ID">101</td>
                <td data-label="Name">Rahul</td>
                <td data-label="Course">CSE</td>
                <td data-label="Marks">85</td>
                <td data-label="Grade">A</td>
            </tr>
            <tr>
                <td data-label="ID">102</td>
                <td data-label="Name">Sneha</td>
                <td data-label="Course">ECE</td>
                <td data-label="Marks">78</td>
                <td data-label="Grade">B+</td>
            </tr>
            <tr>
                <td data-label="ID">103</td>
                <td data-label="Name">Arjun</td>
                <td data-label="Course">IT</td>
                <td data-label="Marks">92</td>
                <td data-label="Grade">A+</td>
            </tr>
            <tr>
                <td data-label="ID">104</td>
                <td data-label="Name">Priya</td>
                <td data-label="Course">EEE</td>
                <td data-label="Marks">74</td>
                <td data-label="Grade">B</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
